    :root {

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; background: linear-gradient(180deg, #fffaf5 0%, #fff4ec 100%); color: var(--text); }

    .app {
      width: min(760px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(240, 223, 213, 0.9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #b85d33;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    h1, h2, h3, p { margin: 0; }

    .hero-title {
      font-size: clamp(32px, 5vw, 48px);
      line-height: 1.15;
      letter-spacing: -0.03em;
      margin-bottom: 14px;
    }

      font-size: 17px;
      line-height: 1.65;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .hero-points {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }

    .hero-point {
      padding: 10px 14px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--line);
      font-size: 14px;
      color: var(--muted);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
      border-radius: 16px;
      padding: 16px 20px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease;
      text-decoration: none;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn-primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 14px 24px rgba(255, 143, 90, 0.3);
    }

    .btn-secondary {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .btn-block { width: 100%; }

    .section { display: none; }
    .section.active { display: block; }

    .progress-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .progress-label {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
    }

    .progress {
      height: 10px;
      background: #f7e8de;
      border-radius: 999px;
      overflow: hidden;
      width: 100%;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff9b6b 0%, #ff7f50 100%);
      border-radius: 999px;
      transition: width .25s ease;
    }

    .question-title {
      font-size: clamp(26px, 4vw, 34px);
      line-height: 1.28;
      letter-spacing: -0.03em;
      margin: 18px 0 22px;
    }

    .answers {
      display: grid;
      gap: 12px;
    }

    .answer {
      width: 100%;
      text-align: left;
      padding: 18px 18px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 18px;
      font-size: 16px;
      color: var(--text);
      cursor: pointer;
      transition: border-color .16s ease, background .16s ease, transform .16s ease;
    }

    .answer:hover {
      border-color: #ffb392;
      background: #fff8f3;
      transform: translateY(-1px);
    }

    .result-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .emoji {
      width: 68px;
      height: 68px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      background: var(--accent-soft);
      font-size: 34px;

    .result-title {

      letter-spacing: -0.03em;
      margin-bottom: 8px;

      color: #b85d33;
      font-weight: 700;
    }

    .result-copy {
      font-size: 17px;
      line-height: 1.8;
      color: #4f4038;
      margin: 22px 0;

    .mini-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 26px;
    }

    .chip {
      padding: 10px 14px;
      border-radius: 999px;
      background: #fff8f3;
      color: #8d5a43;
      border: 1px solid #f3d7c9;
      font-size: 14px;
      font-weight: 700;

    .products {

      gap: 14px;
      margin: 18px 0 28px;

    .product {
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
      background: #fff;
    }

    .product-name {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .product-desc {
      font-size: 15px;
      line-height: 1.7;
      color: var(--muted);
      margin-bottom: 14px;

    .product a {
      display: inline-flex;

      justify-content: center;

      border-radius: 14px;
      background: var(--accent-soft);
      color: #b85d33;
      font-weight: 800;

    .actions {

</head>

        btn.textContent = answer.text;
        btn.addEventListener('click', () => chooseAnswer(answer.score));
        answersWrap.appendChild(btn);
      });
    }

    function chooseAnswer(score) {
      totalScore += score;
      currentIndex += 1;

      if (currentIndex < questions.length) {
        renderQuestion();
      } else {
        renderResult();
      }
    }

    function getResultByScore(score) {
      return resultMap.find(item => score >= item.min && score <= item.max) || resultMap[0];
    }

    function getResultByType(type) {
      return resultMap.find(item => item.type === type) || null;
    }

    async function copyText(text) {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return true;
        }
      } catch (e) {}

      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.left = '-9999px';
      document.body.appendChild(textarea);
      textarea.focus();
      textarea.select();
      let success = false;
      try {
        success = document.execCommand('copy');
      } catch (e) {
        success = false;
      }
      document.body.removeChild(textarea);
      return success;
    }

    function buildResultUrl(type) {
      const url = new URL(window.location.href);
      url.searchParams.set('result', type);
      return url.toString();
    }

    function setButtonTemporaryText(button, text, originalText) {
      button.textContent = text;
      setTimeout(() => {
        button.textContent = originalText;
      }, 1500);
    }

    function renderResult(resultData = null) {
      const data = resultData || getResultByScore(totalScore);
      const resultUrl = buildResultUrl(data.type);
      history.replaceState({}, '', resultUrl);

      resultEmoji.textContent = data.emoji;
      resultTitle.textContent = data.title;
      resultSummary.textContent = data.summary;
      resultDescription.textContent = data.description;
      resultCharacter.src = data.image;
      resultCharacter.style.display = 'block';
      resultCharacter.onerror = () => {
        resultCharacter.style.display = 'none';
      };

      resultChips.innerHTML = '';
      data.chips.forEach(chip => {
        const span = document.createElement('span');
        span.className = 'chip';
        span.textContent = chip;
        resultChips.appendChild(span);
      });

      productsWrap.innerHTML = '';
      data.products.forEach(product => {
        const article = document.createElement('article');
        article.className = 'product';
        const link = document.createElement('a');
        link.href = product.url;
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.textContent = '쿠팡에서 보기';
        link.addEventListener('click', (e) => {
          e.stopPropagation();
        });
        article.innerHTML = `
          <div class="product-name">${product.name}</div>
          <div class="product-desc">${product.desc}</div>
        `;
        article.appendChild(link);
        productsWrap.appendChild(article);
      });

      const shareText = `나 ${data.title.replace('당신은 ', '').replace('입니다', '')} 나옴ㅋㅋ ${data.emoji}
이거 은근 잘 맞는다… 너도 해봐`;

      copyBtn.onclick = async () => {
        const ok = await copyText(shareText);
        if (ok) {
          setButtonTemporaryText(copyBtn, '복사 완료', '결과 문구 복사');
        } else {
          alert('복사에 실패했어요.');
        }
      };

      copyLinkBtn.onclick = async () => {
        const ok = await copyText(resultUrl);
        if (ok) {
          setButtonTemporaryText(copyLinkBtn, '복사 완료', '링크 복사');
        } else {
          alert('링크 복사에 실패했어요.');
        }
      };

      const shareBtn = document.getElementById('shareBtn');
      shareBtn.onclick = async () => {
        if (navigator.share) {
          try {
            await navigator.share({
              title: 'SPTI 과자 성격 테스트',
              text: shareText,
              url: resultUrl
            });
          } catch (e) {}
        } else {
          const ok = await copyText(resultUrl);
          if (ok) {
            alert('공유 기능을 지원하지 않아 링크를 복사했어요.');
          } else {
            alert('공유에 실패했어요.');
          }
        }
      };

      showSection(result);
    }

    startBtn.addEventListener('click', startTest);
    retryBtn.addEventListener('click', () => {
      history.replaceState({}, '', window.location.pathname);
      startTest();
    });

    window.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const resultType = params.get('result');
      if (resultType) {
        const resultData = getResultByType(resultType);
        if (resultData) {
          renderResult(resultData);
          return;
        }
      }
      showSection(landing);
    });
  </script>
</body>
</html>
