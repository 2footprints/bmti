<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bexley</title>
<style>
:root{
  --bg:#f2f4f6;
  --bg2:#e8ebed;
  --card:#ffffff;
  --blue:#3182f6;
  --blue-light:#ebf3fe;
  --blue-dark:#1b64da;
  --navy:#191f28;
  --navy2:#2d3540;
  --text:#191f28;
  --text2:#4e5968;
  --text3:#8b95a1;
  --border:#e5e8eb;
  --border2:#d1d6db;
  --red:#e03131;
  --red-bg:#fff5f5;
  --green:#3182f6;
  --green-bg:#ebf3fe;
  --orange:#e67700;
  --orange-bg:#fff9db;
  --radius:16px;
  --radius-sm:10px;
  --shadow:0 2px 12px rgba(0,0,0,.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}

/* Header */
.header{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;gap:20px;position:sticky;top:0;z-index:100}
.header-logo{font-size:17px;font-weight:800;color:var(--navy);letter-spacing:-.3px}
.header-logo span{color:var(--blue)}
.header-nav{display:flex;gap:4px;margin-left:8px}
.nav-btn{padding:7px 14px;font-size:13px;font-weight:500;border:none;border-radius:8px;cursor:pointer;font-family:inherit;background:transparent;color:var(--text2);transition:all .15s}
.nav-btn:hover{background:var(--bg);color:var(--text)}
.nav-btn.active{background:var(--blue-light);color:var(--blue);font-weight:700}
.header-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.user-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--bg);border-radius:20px;font-size:12px;color:var(--text2)}
.admin-chip{background:var(--blue-light);color:var(--blue);font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px}
.logout-btn{padding:6px 12px;font-size:12px;border:1px solid var(--border2);background:transparent;color:var(--text3);border-radius:8px;cursor:pointer;font-family:inherit}
.logout-btn:hover{border-color:var(--blue);color:var(--blue)}
.notif-dot{width:6px;height:6px;background:var(--red);border-radius:50%;display:inline-block;margin-left:3px;vertical-align:middle}

/* App */
.app{padding:24px;max-width:1200px;margin:0 auto}
.btn{padding:8px 16px;font-size:13px;font-weight:600;border:1px solid var(--border2);background:var(--card);color:var(--text);border-radius:var(--radius-sm);cursor:pointer;font-family:inherit;transition:all .15s;letter-spacing:-.2px}
.btn:hover{border-color:var(--blue);color:var(--blue)}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.primary:hover{background:var(--blue-dark)}
.btn.danger{color:var(--red);border-color:#fcc}
.btn.danger:hover{background:var(--red-bg)}
.btn.ghost{border-color:transparent;color:var(--text3)}
.btn.ghost:hover{background:var(--bg);color:var(--text2)}
.btn.sm{padding:5px 12px;font-size:12px}
select{padding:7px 10px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card);color:var(--text);font-family:inherit;cursor:pointer;font-weight:500}
.status-bar{font-size:12px;color:var(--text3);padding:0 0 16px;min-height:28px}
.status-bar.ok{color:var(--green)}
.status-bar.err{color:var(--red)}

/* Cards */
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:20px}
.card-sm{background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--border);padding:16px}

/* Alert */
.alert-wrap{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.alert-card{border-radius:var(--radius-sm);padding:14px 16px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;transition:opacity .15s}
.alert-card:hover{opacity:.85}
.alert-card.red{background:var(--red-bg);border:1px solid #fcc}
.alert-card.orange{background:var(--orange-bg);border:1px solid #ffd4a8}
.alert-icon{font-size:15px;flex-shrink:0;margin-top:1px}
.alert-body{flex:1}
.alert-title{font-size:12px;font-weight:700;margin-bottom:4px}
.alert-title.red{color:var(--red)}
.alert-title.orange{color:var(--orange)}
.alert-items{display:flex;flex-wrap:wrap;gap:4px}
.alert-tag{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;border:none;cursor:pointer;font-family:inherit}
.alert-tag:hover{opacity:.88}
.alert-tag.red{background:#ffe0e3;color:var(--red)}
.alert-tag.orange{background:#ffe4cc;color:var(--orange)}

/* Pinned */
.pinned-card{background:var(--navy);border-radius:var(--radius);padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .15s}
.pinned-card:hover{background:var(--navy2)}
.pinned-card-text{flex:1;min-width:0}
.pinned-card-title{font-size:13px;font-weight:700;color:#fff;margin-bottom:3px}
.pinned-card-preview{font-size:11px;color:rgba(255,255,255,.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pinned-card-date{font-size:11px;color:rgba(255,255,255,.3);flex-shrink:0}


.weekly-schedule-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
/* My week widget */
.myweek-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:20px}
.myweek-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.myweek-title{font-size:13px;font-weight:700;color:var(--text3);letter-spacing:.2px;text-transform:uppercase}
.myweek-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.myweek-day{border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;min-height:76px;max-height:180px;overflow-y:auto;background:var(--bg)}
.myweek-day.today{border-color:var(--blue);background:var(--blue-light)}
.myweek-day.weekend-day{background:#fafafa;opacity:.7}
.myweek-day-label{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.myweek-day.today .myweek-day-label{color:var(--blue)}
.myweek-day-date{font-size:10px;color:var(--text3);display:block;margin-bottom:5px}
.myweek-day.today .myweek-day-date{color:var(--blue);font-weight:700}
.myweek-item{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;color:#fff;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;display:block;max-width:100%}
.myweek-item:hover{filter:brightness(.88)}
.myweek-empty{font-size:11px;color:var(--text3);padding:4px 0}
.btn.lunch-cat.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.weekly-list{display:flex;flex-direction:column;gap:8px}
.weekly-item{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--bg)}
.weekly-item:last-child{border-bottom:none}
.weekly-name{font-size:13px;font-weight:800;color:var(--navy)}
.weekly-sub{font-size:11px;color:#5b6b7f;margin-top:4px;font-weight:600}
.weekly-empty{font-size:12px;color:var(--text3);padding:8px 0}
@media (max-width: 768px){.weekly-schedule-grid{grid-template-columns:1fr}}

/* Board */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.section-title{font-size:18px;font-weight:800;color:var(--navy);letter-spacing:-.3px}
.filter-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.board-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.client-card{background:var(--card);border-radius:var(--radius);padding:20px;cursor:pointer;border:1px solid var(--border);transition:all .2s;position:relative}
.client-card:hover{border-color:var(--blue);box-shadow:var(--shadow);transform:translateY(-2px)}
.client-card-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.client-avatar{width:44px;height:44px;border-radius:12px;background:var(--navy);color:#fff;font-size:17px;font-weight:800;display:flex;align-items:center;justify-content:center;letter-spacing:-.5px}
.client-warn{background:var(--red-bg);color:var(--red);font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px}
.client-name{font-size:15px;font-weight:800;color:var(--navy);margin-bottom:3px;letter-spacing:-.3px}
.client-industry{font-size:12px;color:var(--text3);margin-bottom:12px}
.chip-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;min-height:22px}
.chip{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;color:#fff}
.client-footer{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--border)}
.client-members{font-size:11px;color:var(--text3)}
.client-active{font-size:12px;color:var(--blue);font-weight:700}
.empty-state{text-align:center;padding:64px 20px;color:var(--text3);grid-column:1/-1}
.empty-icon{font-size:44px;margin-bottom:12px;display:block;opacity:.25}

/* Detail */
.detail-back{display:inline-flex;align-items:center;gap:6px;margin-bottom:20px;cursor:pointer;color:var(--text3);font-size:13px;font-weight:500;padding:6px 0}
.detail-back:hover{color:var(--blue)}
.detail-hero{background:var(--navy);border-radius:var(--radius);padding:24px;margin-bottom:16px;display:flex;align-items:flex-start;gap:20px}
.detail-avatar{width:60px;height:60px;border-radius:16px;background:var(--blue);color:#fff;font-size:26px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.detail-hero-text h2{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.5px;margin-bottom:4px}
.detail-hero-text p{font-size:13px;color:rgba(255,255,255,.4)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.detail-tabs{display:flex;gap:2px;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:20px}
.detail-tab{flex:1;padding:8px;font-size:13px;font-weight:600;border:none;border-radius:8px;cursor:pointer;font-family:inherit;background:transparent;color:var(--text3);transition:all .15s;text-align:center}
.detail-tab.active{background:var(--card);color:var(--navy);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.contract-item{display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;border-radius:var(--radius-sm);transition:all .1s}
.contract-item:hover{background:var(--bg);padding-left:8px;padding-right:8px;margin:0 -8px}
.contract-item:last-child{border-bottom:none}
.contract-icon{width:36px;height:36px;border-radius:8px;background:var(--blue-light);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.contract-info{flex:1;min-width:0}
.contract-name{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:3px}
.contract-sub{font-size:11px;color:var(--text3)}
.contract-badges{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.cst-진행중{background:#e8f5e9;color:#2e7d32}
.cst-완료{background:var(--bg);color:var(--text3)}
.cst-검토중{background:#fff8e1;color:#f57f17}
.cst-해지{background:var(--red-bg);color:var(--red)}
.section-label{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.3px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bg)}
.info-row:last-child{border-bottom:none}
.info-label{font-size:12px;color:var(--text3)}
.info-value{font-size:12px;color:var(--text);font-weight:500;text-align:right}
.memo-area{background:var(--bg);border-radius:var(--radius-sm);padding:12px;font-size:12px;color:var(--text2);line-height:1.7;white-space:pre-wrap;min-height:60px}
.proj-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--bg);cursor:pointer;border-radius:var(--radius-sm);transition:background .1s}
.proj-item:hover{background:var(--bg);padding-left:8px;padding-right:8px;margin:0 -8px}
.proj-item:last-child{border-bottom:none}
.proj-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.proj-info{flex:1;min-width:0}
.proj-name{font-size:13px;font-weight:700;color:var(--navy);letter-spacing:-.2px}
.proj-sub{font-size:11px;color:var(--text3);margin-top:2px}
.proj-warn{font-size:11px;color:var(--red);font-weight:600;margin-top:2px}
.proj-badges{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}

/* Badges */
.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px}
.badge-blue{background:var(--blue-light);color:var(--blue)}
.badge-green{background:var(--green-bg);color:#00a65a}
.badge-gray{background:var(--bg);color:var(--text3)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-orange{background:var(--orange-bg);color:var(--orange)}

/* Gantt */
.gantt-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.month-nav{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px}
.month-label{font-size:14px;font-weight:800;min-width:90px;text-align:center;color:var(--navy);letter-spacing:-.3px}
.month-nav-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;border-radius:6px;cursor:pointer;font-size:16px;color:var(--text3);flex-shrink:0}
.month-nav-btn:hover{background:var(--bg);color:var(--text)}
.gantt-wrap{overflow-x:auto;background:var(--card);border:1px solid var(--border);border-radius:var(--radius)}
table{border-collapse:collapse;min-width:100%}
.th-label{position:sticky;left:0;z-index:3;background:#f7fafc;font-size:11px;font-weight:800;color:#6b7684;padding:10px 14px;white-space:nowrap;border-bottom:1px solid var(--border);border-right:1px solid #dbe2ea;min-width:160px;letter-spacing:.2px;text-transform:uppercase}
.th-day{font-size:10px;color:var(--text3);padding:6px 2px;text-align:center;min-width:28px;border-bottom:1px solid var(--border);font-weight:500}
.th-day.weekend{background:#fafafa;color:var(--blue)}
.th-day.today-h{background:var(--blue);color:#fff;font-weight:800}
.sec-row td{background:#f8f9fa;font-size:11px;font-weight:700;color:var(--text3);padding:5px 14px;border-top:1px solid var(--border);letter-spacing:.2px;text-transform:uppercase}
.row-label{position:sticky;left:0;z-index:2;background:linear-gradient(180deg,#ffffff 0%,#fbfcfe 100%);font-size:12px;color:var(--text);padding:8px 14px;white-space:nowrap;border-right:1px solid #dbe2ea;vertical-align:middle;cursor:pointer}
.row-label:hover{background:#f4f8fd}
.row-label .rn{font-weight:800;color:var(--navy);letter-spacing:-.2px}
.row-label .rs{font-size:11px;color:#5b6b7f;margin-top:4px;font-weight:600}
.row-label.row-warn{background:#fff8f2}
.row-label.row-conflict{background:#fff6f8}
.cell{min-width:28px;height:34px;padding:0;position:relative;border-right:1px solid #f0f2f4}
.cell.weekend{background:#fafafa}
.cell.today-c{background:rgba(49,130,246,.06)}
.bar{position:absolute;top:5px;bottom:5px;border-radius:6px;display:flex;align-items:center;padding:0 8px;font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;cursor:pointer;z-index:1;letter-spacing:-.2px}
.bar:hover{filter:brightness(.92)}
.bar.conflict{outline:2px solid var(--red);outline-offset:1px}
.g-badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;margin-left:3px}
.g-badge.conflict{background:rgba(240,68,82,.15);color:var(--red)}
.g-badge.overdue{background:rgba(255,107,0,.15);color:var(--orange)}
.g-badge.mine{background:rgba(49,130,246,.15);color:var(--blue)}
.legend{display:flex;gap:14px;flex-wrap:wrap;padding:12px 0 2px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);font-weight:500}
.legend-dot{width:8px;height:8px;border-radius:3px;flex-shrink:0}

/* Dash */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.stat-card.clickable{cursor:pointer;transition:all .15s}
.stat-card.clickable:hover{border-color:var(--blue);box-shadow:var(--shadow);transform:translateY(-2px)}
.stat-label{font-size:12px;font-weight:600;color:var(--text3);margin-bottom:10px}
.stat-num{font-size:32px;font-weight:800;color:var(--navy);letter-spacing:-1px;line-height:1}
.stat-sub{font-size:11px;color:var(--text3);margin-top:6px}
.stat-card.warn .stat-num{color:var(--red)}
.stat-card.ok .stat-num{color:var(--green)}
.dash-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.load-row{display:flex;align-items:center;gap:10px;padding:6px 0}
.load-name{font-size:13px;color:var(--text);width:72px;flex-shrink:0;font-weight:600}
.load-bar-wrap{flex:1;background:var(--bg);border-radius:20px;height:6px;overflow:hidden}
.load-bar{height:100%;border-radius:20px;background:var(--blue);transition:width .4s}
.load-bar.overload{background:var(--red)}
.load-count{font-size:12px;color:var(--text3);width:28px;text-align:right;font-weight:700}
.load-count.overload{color:var(--red)}

/* Notice */
.notice-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;cursor:pointer;transition:all .15s;margin-bottom:10px}
.notice-card:hover{border-color:var(--blue);box-shadow:var(--shadow)}
.notice-card.pinned{border-left:3px solid var(--blue)}
.notice-chip-row{display:flex;gap:6px;margin-bottom:8px}
.notice-title{font-size:15px;font-weight:800;color:var(--navy);margin-bottom:6px;letter-spacing:-.3px}
.notice-meta{font-size:11px;color:var(--text3);margin-bottom:6px}
.notice-preview{font-size:12px;color:var(--text2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.6}
.notice-empty{text-align:center;padding:48px 20px;color:var(--text3);background:var(--card);border:1px solid var(--border);border-radius:var(--radius)}
.notice-detail-title{font-size:20px;font-weight:800;color:var(--navy);margin-bottom:8px;letter-spacing:-.5px}
.notice-detail-meta{font-size:12px;color:var(--text3);margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.notice-detail-body{font-size:14px;color:var(--text2);line-height:1.8;white-space:pre-wrap}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(25,31,40,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border-radius:20px;padding:28px;width:480px;max-width:100%;box-shadow:var(--shadow-lg);max-height:90vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:800;color:var(--navy);margin-bottom:16px;letter-spacing:-.3px}
.modal-tabs{display:flex;gap:2px;background:var(--bg);border-radius:8px;padding:3px;margin-bottom:20px}
.modal-tab{flex:1;padding:7px;font-size:12px;font-weight:600;border:none;border-radius:6px;cursor:pointer;font-family:inherit;background:transparent;color:var(--text3);transition:all .15s;text-align:center}
.modal-tab.active{background:var(--card);color:var(--navy);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.modal-tab-content{display:none}
.modal-tab-content.active{display:block}
.form-row{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;letter-spacing:-.1px}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:11px 14px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;color:var(--text);font-family:inherit;transition:border .15s;font-weight:500}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(49,130,246,.1)}
.form-half{display:flex;gap:10px}
.form-half .form-row{flex:1}
.member-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.member-tag{display:flex;align-items:center;gap:5px;background:var(--blue-light);color:var(--blue);font-size:12px;font-weight:700;padding:5px 10px;border-radius:20px}
.member-tag button{background:none;border:none;cursor:pointer;color:var(--blue);font-size:14px;line-height:1;padding:0;opacity:.6}
.member-tag button:hover{opacity:1}
.modal-footer{display:flex;justify-content:space-between;align-items:center;margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}
.modal-footer-right{display:flex;gap:8px}
.conflict-warn{background:var(--red-bg);color:var(--red);font-size:12px;padding:10px 14px;border-radius:var(--radius-sm);margin-top:10px;font-weight:500}
.readonly-notice{background:var(--bg);color:var(--text3);font-size:12px;padding:10px 14px;border-radius:var(--radius-sm);margin-top:10px}
.divider{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.3px;text-transform:uppercase;margin:18px 0 12px;display:flex;align-items:center;gap:8px}
.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.checkbox-row{display:flex;align-items:center;gap:8px;padding:8px 0}
.checkbox-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--blue);cursor:pointer;flex-shrink:0}
.checkbox-row label{font-size:13px;color:var(--text);cursor:pointer;font-weight:500}


.helper-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-top:12px}
.helper-title{font-size:12px;font-weight:800;color:var(--navy);margin-bottom:8px}
.helper-text{font-size:12px;color:var(--text2);line-height:1.7}
.copy-area{width:100%;min-height:220px;padding:12px 14px;font-size:12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text2);font-family:inherit;line-height:1.7;resize:vertical}
.muted{font-size:11px;color:var(--text3)}

.comment-list{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.comment-item{border:1px solid var(--border);border-radius:12px;padding:12px;background:#fff}
.comment-item.reply{margin-left:26px;background:var(--bg)}
.comment-meta{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
.comment-author{font-size:12px;font-weight:700;color:var(--navy)}
.comment-date{font-size:11px;color:var(--text3)}
.comment-body{font-size:12px;color:var(--text2);line-height:1.7;white-space:pre-wrap}
.comment-actions{display:flex;gap:6px;margin-top:8px}
.comment-editor{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.comment-empty{font-size:12px;color:var(--text3);padding:10px 0}
.comment-system{background:var(--bg);border:1px dashed var(--border2);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--text3);line-height:1.6}

/* Popup */
.popup-bg{position:fixed;inset:0;background:rgba(25,31,40,.75);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.popup-box{background:var(--card);border-radius:20px;padding:32px;width:400px;max-width:100%;text-align:center}
.popup-tag{background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:4px 12px;border-radius:6px;display:inline-block;margin-bottom:16px}
.popup-title{font-size:20px;font-weight:800;color:var(--navy);margin-bottom:10px;letter-spacing:-.5px}
.popup-body{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:24px;text-align:left;white-space:pre-wrap;background:var(--bg);padding:14px;border-radius:var(--radius-sm)}

/* Login */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
.login-box{background:var(--card);border-radius:20px;padding:40px;width:400px;max-width:100%;box-shadow:var(--shadow-lg)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo-mark{width:52px;height:52px;background:var(--blue);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;margin:0 auto 14px}
.login-logo h1{font-size:22px;font-weight:800;color:var(--navy);letter-spacing:-.5px}
.login-logo p{font-size:13px;color:var(--text3);margin-top:4px}
.login-tabs{display:flex;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:24px}
.login-tab{flex:1;padding:9px;font-size:13px;font-weight:600;border:none;border-radius:8px;cursor:pointer;font-family:inherit;background:transparent;color:var(--text3);transition:all .15s}
.login-tab.active{background:var(--card);color:var(--navy);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.login-input-wrap{margin-bottom:14px}
.login-input-wrap label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px}
.login-input-wrap input{width:100%;padding:12px 14px;font-size:14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;color:var(--text);background:#fff;transition:border .15s}
.login-input-wrap input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(49,130,246,.1)}
.login-submit{width:100%;padding:14px;font-size:14px;font-weight:800;background:var(--blue);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;font-family:inherit;letter-spacing:-.2px;transition:background .15s;margin-top:4px}
.login-submit:hover{background:var(--blue-dark)}
.login-submit:disabled{background:var(--text3);cursor:not-allowed}
.login-msg{font-size:12px;text-align:center;margin-top:10px;min-height:18px;font-weight:500}
.login-msg.err{color:var(--red)}
.login-msg.ok{color:var(--green)}
</style>
</head>

<script>
const SB_URL='https://ueysvpndnpejcnyonecq.supabase.co';
const SB_KEY='sb_publishable_cLopHWFkUpZ5LN5thjd3eQ_UpLHh8Pe';
let accessToken=null,refreshToken=null,currentUser=null,isAdmin=false,currentMember=null;
let projects=[],members=[],clients=[],notices=[],schedules=[],contracts=[],billingLogs=[];
let curPage='clients',curGView='project';
const NOW=new Date();
let curYear=NOW.getFullYear(),curMonth=NOW.getMonth()+1;
let editingProjId=null,formMembers=[],editingClientId=null,editingContractId=null;
let projectComments=[],activeReplyParentId=null;

const TYPES={'감사':'#4E5968','세무':'#3182F6','밸류에이션':'#8B7CF6','자문':'#5B8DEF','실사':'#2BB673','기타':'#7B8794'};
const ST_OP={'진행중':1,'예정':.5,'완료':.3};
const SCHEDULE_META={
  leave:{label:'휴가',color:'#52C41A'},
  fieldwork:{label:'필드웍',color:'#5B8DEF'},
  internal:{label:'내부업무',color:'#8B95A1'},
  project:{label:'프로젝트 일정',color:'#3182f6'}
};

// ── Auth ──
function saveSession(s){accessToken=s.access_token;refreshToken=s.refresh_token;currentUser=s.user;localStorage.setItem('sb_a',accessToken);localStorage.setItem('sb_r',refreshToken);}
function clearSession(){accessToken=null;refreshToken=null;currentUser=null;isAdmin=false;currentMember=null;['sb_a','sb_r'].forEach(k=>localStorage.removeItem(k));}
async function restoreSession(){
  const at=localStorage.getItem('sb_a'),rt=localStorage.getItem('sb_r');
  if(!at||!rt)return false;
  try{const r=await fetch(SB_URL+'/auth/v1/token?grant_type=refresh_token',{method:'POST',headers:{'Content-Type':'application/json','apikey':SB_KEY},body:JSON.stringify({refresh_token:rt})});if(!r.ok)throw 0;const d=await r.json();saveSession(d);return true;}
  catch(e){clearSession();return false;}
}
async function signIn(e,p){const r=await fetch(SB_URL+'/auth/v1/token?grant_type=password',{method:'POST',headers:{'Content-Type':'application/json','apikey':SB_KEY},body:JSON.stringify({email:e,password:p})});const d=await r.json();if(!r.ok)throw new Error(d.error_description||'로그인 실패');saveSession(d);}
async function signUp(e,p){const r=await fetch(SB_URL+'/auth/v1/signup',{method:'POST',headers:{'Content-Type':'application/json','apikey':SB_KEY},body:JSON.stringify({email:e,password:p})});const d=await r.json();if(!r.ok)throw new Error(d.msg||'가입 실패');return d;}
async function doLogout(){if(accessToken)await fetch(SB_URL+'/auth/v1/logout',{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+accessToken}}).catch(()=>{});clearSession();showPage('login');}

let authMode='login';
function switchTab(m){
  authMode=m;
  document.getElementById('tabLogin').classList.toggle('active',m==='login');
  document.getElementById('tabSignup').classList.toggle('active',m==='signup');
  document.getElementById('authBtn').textContent=m==='login'?'로그인':'회원가입';
  document.getElementById('authMsg').textContent='';
}
async function doAuth(){
  const email=document.getElementById('authEmail').value.trim(),pw=document.getElementById('authPw').value;
  const msg=document.getElementById('authMsg'),btn=document.getElementById('authBtn');
  if(!email||!pw){setMsg(msg,'이메일과 비밀번호를 입력해주세요.','err');return;}
  if(!email.endsWith('@bexleyintl.com')){setMsg(msg,'회사 이메일만 사용 가능합니다.','err');return;}
  if(pw.length<6){setMsg(msg,'비밀번호는 6자 이상이어야 합니다.','err');return;}
  btn.disabled=true;btn.textContent=authMode==='login'?'로그인 중...':'가입 중...';
  try{
    if(authMode==='login'){await signIn(email,pw);await initApp();}
    else{await signUp(email,pw);setMsg(msg,'가입 완료! 인증 메일을 확인해주세요.','ok');switchTab('login');}
  }catch(e){const em={'Invalid login credentials':'이메일 또는 비밀번호가 올바르지 않습니다.','Email not confirmed':'이메일 인증이 필요합니다.'};setMsg(msg,em[e.message]||e.message,'err');}
  finally{btn.disabled=false;btn.textContent=authMode==='login'?'로그인':'회원가입';}
}
function setMsg(el,txt,type){el.textContent=txt;el.className='login-msg'+(type?' '+type:'');}
function showPage(p){document.getElementById('loginPage').style.display=p==='login'?'flex':'none';document.getElementById('mainApp').style.display=p==='main'?'block':'none';}

async function initApp(){
  showPage('main');
  try{
    const[roles,mm]=await Promise.all([api('GET','user_roles?id=eq.'+currentUser.id+'&select=is_admin'),api('GET','members?email=eq.'+encodeURIComponent(currentUser.email)+'&select=*')]);
    isAdmin=roles&&roles[0]?.is_admin||false;currentMember=mm&&mm[0]||null;
  }catch(e){}
  document.getElementById('adminChip').style.display=isAdmin?'inline-block':'none';
  document.getElementById('memberMgrBtn').style.display=isAdmin?'inline-block':'none';
  document.getElementById('noticeWriteBtn').style.display=isAdmin?'inline-block':'none';
  document.getElementById('logBtn').style.display=isAdmin?'inline-block':'none';
  document.getElementById('userDisplay').textContent=currentMember?currentMember.name:currentUser.email;
  await loadAll();
  checkPopup();
  setPage('clients');
}

// ── API ──
async function api(method,path,body){
  const headers={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+(accessToken||SB_KEY)};
  if(body)headers['Prefer']='return=representation';
  const r=await fetch(SB_URL+'/rest/v1/'+path,{method,headers,body:body?JSON.stringify(body):undefined});
  if(!r.ok){const e=await r.text();throw new Error(e);}
  const t=await r.text();return t?JSON.parse(t):null;
}

async function loadAll(){
  setStatus('불러오는 중...');
  try{
    const[projs,mems,pm,cls,nts,schs,ctrs,blogs]=await Promise.all([
      api('GET','projects?select=*&order=start_date'),
      api('GET','members?select=*&order=name'),
      api('GET','project_members?select=project_id,member_id,members(name)'),
      api('GET','clients?select=*&order=name'),
      api('GET','notices?select=*&order=is_pinned.desc,created_at.desc'),
      api('GET','schedules?select=*&order=start_date'),
      api('GET','contracts?select=*&order=created_at.desc'),
      api('GET','billing_logs?select=*&order=created_at.desc')
    ]);
    members=mems||[];
    projects=(projs||[]).map(p=>({...p,start:p.start_date,end:p.end_date,members:(pm||[]).filter(x=>x.project_id===p.id).map(x=>x.members?.name).filter(Boolean)}));
    clients=cls||[];notices=nts||[];contracts=ctrs||[];billingLogs=blogs||[];
    schedules=(schs||[]).map(s=>({...s,start:s.start_date,end:s.end_date,member_name:s.member_name||members.find(m=>m.id===s.member_id)?.name||''}));
    populateMemberFilter();
    setStatus('✓ '+clients.length+'개 고객사 · '+projects.length+'개 프로젝트','ok');
    updateNoticeDot();
  }catch(e){setStatus('오류: '+e.message,'err');}
}

function setStatus(msg,type=''){
  const el=document.getElementById('statusBar');if(!el)return;
  el.textContent=msg;el.className='status-bar'+(type?' '+type:'');
  if(type==='ok')setTimeout(()=>{el.textContent='';el.className='status-bar';},3000);
}

function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function noticeReadKey(id){return 'notice_read_'+(currentUser?.id||'guest')+'_'+id;}
function isNoticeRead(id){return localStorage.getItem(noticeReadKey(id))==='1';}
function markNoticeRead(id){localStorage.setItem(noticeReadKey(id),'1');}
function getUnreadRequiredNotices(){return notices.filter(n=>n.require_confirm&&!isNoticeRead(n.id));}
function billingDraftKey(id){return 'billing_draft_'+(currentUser?.id||'guest')+'_'+id;}
function getBillingDraft(id){try{return JSON.parse(localStorage.getItem(billingDraftKey(id))||'{}');}catch(e){return {};}}
function saveBillingDraft(id,data){localStorage.setItem(billingDraftKey(id),JSON.stringify(data||{}));}
async function copyText(text){
  try{await navigator.clipboard.writeText(text);alert('메일 문안을 복사했습니다.');}
  catch(e){const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('메일 문안을 복사했습니다.');}
}
function inferBillingMonth(project){const base=project?.end||project?.start||new Date().toISOString().slice(0,10);const d=toDate(base);return d.getFullYear()+'년 '+String(d.getMonth()+1).padStart(2,'0')+'월';}
function formatBillingDate(value){
  if(!value) return '';
  if(/^\d{4}-\d{2}-\d{2}$/.test(value)){
    const d=toDate(value);
    return (d.getMonth()+1)+'월 '+d.getDate()+'일';
  }
  return value;
}
function buildBillingEmail(project, client, helper){
  const taxName=helper.tax_invoice_name||'';
  const companyName=client?.name||'';
  const contractName=project?.name||'';
  const amount=helper.billing_amount||project?.billing_amount||'';
  const issueDate=formatIssueDateInput(helper.issue_date||'');
  const contactName=helper.client_contact_name||client?.contact_name||'';
  const contactEmail=helper.client_contact_email||client?.contact_email||'';
  return `안녕하세요, ${taxName}님 
${companyName} ${contractName} 관련하여 다음과 같이 세금계산서 발급 부탁드립니다.  

대상회사 : ${companyName}
빌링금액 : ${amount?Number(amount).toLocaleString():''} ${amount?'(VAT별도)':''}
일자 : ${issueDate}
품목 : ${contractName}
발급이메일 : ${contactName} ${contactEmail}`;
}

function formatCommentDate(ts){
  if(!ts)return '';
  const d=new Date(ts);
  const yy=d.getFullYear();
  const mm=String(d.getMonth()+1).padStart(2,'0');
  const dd=String(d.getDate()).padStart(2,'0');
  const hh=String(d.getHours()).padStart(2,'0');
  const mi=String(d.getMinutes()).padStart(2,'0');
  return `${yy}.${mm}.${dd} ${hh}:${mi}`;
}
function formatIssueDateInput(value){
  const v=String(value||'').trim();
  if(!v)return '';
  const m=v.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(m)return `${Number(m[2])}월 ${Number(m[3])}일`;
  return v;
}

// ── Alerts ──
function getAlerts(){
  const today=new Date();today.setHours(0,0,0,0);
  const overdue=[],unbilled=[];
  projects.forEach(p=>{
    if(toDate(p.end)<today&&p.status!=='완료')overdue.push({id:p.id,name:p.name});
    if(p.status==='완료'&&p.is_billable&&p.billing_status==='미청구')unbilled.push({id:p.id,name:p.name});
  });
  return{overdue,unbilled};
}
function openAlertProject(id){
  if(!id)return;
  openProjModal(id);
}
function getWeekBounds(){
  const base=new Date();
  base.setHours(0,0,0,0);
  const day=base.getDay();
  const diffToMonday=(day+6)%7;
  const start=new Date(base);
  start.setDate(base.getDate()-diffToMonday);
  const end=new Date(start);
  end.setDate(start.getDate()+6);
  end.setHours(23,59,59,999);
  return {start,end};
}
function formatRangeShort(start,end){
  const s=toDate(start),e=toDate(end);
  const sm=s.getMonth()+1, sd=s.getDate(), em=e.getMonth()+1, ed=e.getDate();
  return sm===em && sd===ed ? `${sm}.${sd}` : `${sm}.${sd} ~ ${em}.${ed}`;
}
function getWeeklySchedules(){
  const {start,end}=getWeekBounds();
  const inWeek=s=>toDate(s.start)<=end && toDate(s.end)>=start;
  const sortFn=(a,b)=>toDate(a.start)-toDate(b.start) || (a.member_name||'').localeCompare(b.member_name||'');
  return {
    leave:schedules.filter(s=>s.schedule_type==='leave'&&inWeek(s)).sort(sortFn),
    fieldwork:schedules.filter(s=>s.schedule_type==='fieldwork'&&inWeek(s)).sort(sortFn)
  };
}
function renderWeeklyScheduleSummary(){
  const el=document.getElementById('memberScheduleWrap');
  if(!el)return;
  const week=getWeeklySchedules();
  const section=(title,icon,type,items,badgeClass)=>`<div class="card"><div class="section-label">${icon} ${title}</div><div class="weekly-list">${items.length?items.map(s=>`<div class="weekly-item"><div><div class="weekly-name">${esc(s.member_name||'담당자 미지정')}</div><div class="weekly-sub">${formatRangeShort(s.start,s.end)}${s.location?` · ${esc(s.location)}`:''}${s.title?` · ${esc(s.title)}`:''}</div></div><span class="badge ${badgeClass}">${scheduleLabel(type)}</span></div>`).join(''):`<div class="weekly-empty">${type==='leave'?'이번 주 휴가 일정이 없습니다.':type==='fieldwork'?'이번 주 필드웍 일정이 없습니다.':'이번 주 일정이 없습니다.'}</div>`}</div></div>`;
  el.innerHTML='<div class="weekly-schedule-grid">'
    +section('이번 주 휴가자','🌿','leave',week.leave,'badge-green')
    +section('이번 주 필드웍','🚗','fieldwork',week.fieldwork,'badge-orange')
    +'</div>';
}
function renderMyWeek(){
  const el=document.getElementById('myWeekWrap');if(!el)return;
  if(!currentMember){el.innerHTML='';return;}
  const today=new Date();today.setHours(0,0,0,0);
  // 이번 주 월~금
  const dayOfWeek=today.getDay();
  const diffToMon=dayOfWeek===0?-6:1-dayOfWeek;
  const monday=new Date(today);monday.setDate(today.getDate()+diffToMon);
  const days=Array.from({length:5},(_,i)=>{const d=new Date(monday);d.setDate(monday.getDate()+i);return d;});
  const dayLabels=['월','화','수','목','금'];
  const fmt=d=>d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
  // 내 프로젝트 (이번 주 걸치는 것)
  const myProjs=projects.filter(p=>
    p.members.includes(currentMember.name)&&p.status!=='완료'&&
    toDate(p.start)<=days[4]&&toDate(p.end)>=days[0]
  );
  // 내 스케줄
  const mySchs=schedules.filter(s=>
    s.member_name===currentMember.name&&
    toDate(s.start)<=days[4]&&toDate(s.end)>=days[0]
  );
  const cols=days.map((d,i)=>{
    const ds=fmt(d);
    const isToday=d.getTime()===today.getTime();
    const items=[];
    // 프로젝트
    myProjs.forEach(p=>{
      if(toDate(p.start)<=d&&toDate(p.end)>=d){
        const client=clients.find(c=>c.id===p.client_id);
        const label=(client?client.name+' ':'')+p.name;
        items.push('<span class="myweek-item" style="background:'+( TYPES[p.type]||'#4e5968')+'" onclick="openProjModal(\''+p.id+'\')" title="'+esc(label)+'">'+esc(label)+'</span>');
      }
    });
    // 스케줄 (휴가/필드웍/내부업무)
    mySchs.forEach(s=>{
      if(toDate(s.start)<=d&&toDate(s.end)>=d){
        const color=SCHEDULE_META[s.schedule_type]?.color||'#8b95a1';
        const label=s.title||SCHEDULE_META[s.schedule_type]?.label||s.schedule_type;
        items.push('<span class="myweek-item" style="background:'+color+';opacity:.85" onclick="openScheduleModal(\''+s.id+'\')" title="'+esc(label)+'">'+esc(label)+'</span>');
      }
    });
    return '<div class="myweek-day'+(isToday?' today':'')+'">'
      +'<div class="myweek-day-label">'+dayLabels[i]+'<span class="myweek-day-date">'+(d.getMonth()+1)+'/'+d.getDate()+'</span></div>'
      +(items.length?items.join(''):'<div class="myweek-empty">—</div>')
      +'</div>';
  }).join('');
  // 이번 주 날짜 범위
  const rangeLabel=(monday.getMonth()+1)+'.'+monday.getDate()+' ~ '+(days[4].getMonth()+1)+'.'+days[4].getDate();
  el.innerHTML='<div class="myweek-card">'
    +'<div class="myweek-header">'
    +'<span class="myweek-title">이번 주 내 일정 ('+currentMember.name+')</span>'
    +'<span style="font-size:11px;color:var(--text3)">'+rangeLabel+'</span>'
    +'</div>'
    +'<div class="myweek-grid">'+cols+'</div>'
    +'</div>';
}

function setPage(page){
  curPage=page;
  ['pageClients','pageDetail','pageGantt','pageDash','pageNotice'].forEach(id=>document.getElementById(id).style.display='none');
  ['navGantt','navDash','navNotice'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.querySelector('.header-logo').style.color=(page==='clients'||page==='detail')?'var(--blue)':'var(--navy)';
  const pages={clients:'pageClients',detail:'pageDetail',gantt:'pageGantt',dash:'pageDash',notice:'pageNotice'};
  const navs={gantt:'navGantt',dash:'navDash',notice:'navNotice'};
  document.getElementById(pages[page]).style.display='block';
  if(navs[page])document.getElementById(navs[page]).classList.add('active');
  if(page==='clients'){renderMyWeek();renderWeeklyScheduleSummary();renderAlerts();renderClients();}
  else if(page==='gantt')renderGantt();
  else if(page==='dash')renderDash();
  else if(page==='notice')renderNotices();
}

async function saveContract(){
  const client_id=document.getElementById('ctClient').value;
  const contract_name=document.getElementById('ctName').value.trim();
  if(!contract_name){alert('계약명을 입력해주세요.');return;}
  const body={
    client_id:client_id||null,
    contract_name,
    contract_code:document.getElementById('ctCode').value.trim()||null,
    contract_type:document.getElementById('ctType').value.trim()||null,
    contract_status:document.getElementById('ctStatus').value,
    contract_start_date:document.getElementById('ctStart').value||null,
    contract_end_date:document.getElementById('ctEnd').value||null,
    contract_amount:document.getElementById('ctAmt').value?parseInt(document.getElementById('ctAmt').value):null,
    vat_included:document.getElementById('ctVat').value==='true',
    billing_contact_name:document.getElementById('ctBillingContact').value.trim()||null,
    billing_contact_email:document.getElementById('ctBillingEmail').value.trim()||null,
    counterparty_contact_name:document.getElementById('ctCpContact').value.trim()||null,
    counterparty_contact_email:document.getElementById('ctCpEmail').value.trim()||null,
    description:document.getElementById('ctDesc').value.trim()||null,
    deliverables:document.getElementById('ctDeliv').value.trim()||null,
    memo:document.getElementById('ctMemo').value.trim()||null
  };
  try{
    if(editingContractId){
      await api('PATCH','contracts?id=eq.'+editingContractId,{...body,updated_at:new Date().toISOString()});
      await logActivity('계약 수정','contract',editingContractId,contract_name);
    }else{
      body.created_by=currentUser.id;
      const res=await api('POST','contracts',body);
      await logActivity('계약 추가','contract',res?.[0]?.id,contract_name);
    }
    closeModal();
    await loadAll();
    if(client_id)openClientDetail(client_id,'contracts');
    else renderClients();
  }catch(e){alert('저장 오류: '+e.message);}
}

async function deleteContract(id){
  const ct=contracts.find(x=>x.id===id);
  if(!confirm('"'+(ct?.contract_name||'이 계약')+'"을 삭제할까요?'))return;
  try{
    await api('DELETE','contracts?id=eq.'+id);
    await logActivity('계약 삭제','contract',id,ct?.contract_name||'');
    closeModal();
    await loadAll();
    if(ct?.client_id)openClientDetail(ct.client_id,'contracts');
    else renderClients();
  }catch(e){alert('오류: '+e.message);}
}

function openProjModalWithContract(contractId, clientId){

  },60);
}

function autoFillFromContract(contractId){
  if(!contractId)return;
  const ct=contracts.find(x=>x.id===contractId);
  if(!ct)return;
  // 기간 자동 채움 (비어있을 때만)
  const startEl=document.getElementById('fStart');
  const endEl=document.getElementById('fEnd');
  if(startEl&&!startEl.value&&ct.contract_start_date) startEl.value=ct.contract_start_date;
  if(endEl&&!endEl.value&&ct.contract_end_date) endEl.value=ct.contract_end_date;
  // 빌링 금액 힌트 표시
  if(ct.contract_amount){
    const amtEl=document.getElementById('fAmt');
    if(amtEl&&!amtEl.value) amtEl.placeholder='계약금액: '+Number(ct.contract_amount).toLocaleString()+'원';
  }
  refreshConflict();
}

async function saveClient(){
  const name=document.getElementById('cName').value.trim();if(!name){alert('고객사명을 입력해주세요.');return;}
  const body={name,industry:document.getElementById('cInd').value.trim(),contact_name:document.getElementById('cCN').value.trim(),contact_phone:document.getElementById('cCP').value.trim(),contact_email:document.getElementById('cCE').value.trim(),memo:document.getElementById('cMemo').value.trim()};
  try{
    if(editingClientId){await api('PATCH','clients?id=eq.'+editingClientId,body);await logActivity('고객사 수정','client',editingClientId,name);}
    else{body.created_by=currentUser.id;const res=await api('POST','clients',body);await logActivity('고객사 추가','client',res?.[0]?.id,name);}
    closeModal();await loadAll();
    if(curPage==='detail'&&editingClientId)openClientDetail(editingClientId);else renderClients();
  }catch(e){alert('오류: '+e.message);}
}
async function deleteClient(id){
  const c=clients.find(x=>x.id===id);
  if(!confirm('고객사를 삭제할까요?'))return;
  try{await api('DELETE','clients?id=eq.'+id);await logActivity('고객사 삭제','client',id,c?.name||'');closeModal();await loadAll();setPage('clients');}catch(e){alert('오류: '+e.message);}
}

// ── Gantt ──
function pad(n){return String(n).padStart(2,'0');}
function daysInMonth(y,m){return new Date(y,m,0).getDate();}
function toDate(s){if(!s)return new Date(0);const[y,mo,d]=s.split('-').map(Number);return new Date(y,mo-1,d);}
function isWeekend(y,m,d){const w=new Date(y,m-1,d).getDay();return w===0||w===6;}
function isToday(y,m,d){const t=new Date();return t.getFullYear()===y&&t.getMonth()+1===m&&t.getDate()===d;}
function hasConflict(p){if(p.type==='휴가')return false;return projects.some(o=>{if(o.id===p.id||o.type==='휴가')return false;if(!p.members.some(m=>o.members.includes(m)))return false;return toDate(p.start)<=toDate(o.end)&&toDate(p.end)>=toDate(o.start);});}
function getConflicts(mems,s,e,xid){return projects.filter(o=>{if(o.id===xid||o.type==='휴가')return false;if(!mems.some(m=>o.members.includes(m)))return false;return toDate(s)<=toDate(o.end)&&toDate(e)>=toDate(o.start);}).map(o=>o.name);}
function canEdit(p){return isAdmin||(currentUser&&p.created_by===currentUser.id);}
function isOverdue(p){return toDate(p.end)<new Date()&&p.status!=='완료';}
function scheduleLabel(type){return SCHEDULE_META[type]?.label||type||'일정';}
function scheduleColor(type){return SCHEDULE_META[type]?.color||'#8b95a1';}
function isScheduleConflict(s){
  if(!s.member_name)return false;
  return projects.some(p=>p.members.includes(s.member_name)&&toDate(s.start)<=toDate(p.end)&&toDate(s.end)>=toDate(p.start)&&p.status!=='완료');
}
function findScheduleProjectConflict(s){
  if(!s.member_name)return [];
  return projects.filter(p=>p.members.includes(s.member_name)&&toDate(s.start)<=toDate(p.end)&&toDate(s.end)>=toDate(p.start)&&p.status!=='완료');
}
function setGView(v){
  curGView=v;
  ['gvp','gvm'].forEach(id=>{document.getElementById(id).style.cssText='';});
  document.getElementById(v==='project'?'gvp':'gvm').style.cssText='background:var(--navy);color:#fff;border-color:var(--navy)';
  renderGantt();
}


function populateMemberFilter(){
  const sel=document.getElementById('memberFilter');const prev=sel.value;
  sel.innerHTML='<option value="me">내 일정</option><option value="">전체</option>';
  members.forEach(m=>{const o=document.createElement('option');o.value=m.name;o.textContent=m.name;sel.appendChild(o);});
  if(prev&&prev!=='me'&&prev!=='')sel.value=prev;
}

function renderGantt(){
  document.getElementById('monthLabel').textContent=curYear+'년 '+curMonth+'월';
  const days=daysInMonth(curYear,curMonth);
  const mf=document.getElementById('memberFilter').value;
  const mFirst=new Date(curYear,curMonth-1,1),mLast=new Date(curYear,curMonth-1,days);
  let projs=projects.filter(p=>{
    if(mf==='me'&&currentMember&&!p.members.includes(currentMember.name))return false;
    if(mf&&mf!=='me'&&!p.members.includes(mf))return false;
    return toDate(p.start)<=mLast&&toDate(p.end)>=mFirst;
  });
  let schs=schedules.filter(s=>{
    const owner=s.member_name||'';
    if(mf==='me'&&currentMember&&owner!==currentMember.name)return false;
    if(mf&&mf!=='me'&&owner!==mf)return false;
    return toDate(s.start)<=mLast&&toDate(s.end)>=mFirst;
  });
  if(!projs.length&&!schs.length){document.getElementById('ganttWrap').innerHTML='<div class="empty-state" style="padding:40px">이 달에 프로젝트와 일정이 없습니다.</div>';renderLegend();return;}
  let html='<table><thead><tr><th class="th-label">'+(curGView==='project'?'구분':'인력')+'</th>';
  for(let d=1;d<=days;d++){
    const wk=isWeekend(curYear,curMonth,d),td=isToday(curYear,curMonth,d);const wd=['일','월','화','수','목','금','토'][new Date(curYear,curMonth-1,d).getDay()];
    html+='<th class="th-day '+(td?'today-h':wk?'weekend':'')+'">'+d+'<br><span style="font-size:9px;font-weight:400">'+wd+'</span></th>';
  }
  html+='</tr></thead><tbody>';
  if(curGView==='project'){
    const bt={};projs.forEach(p=>{(bt[p.type]=bt[p.type]||[]).push(p);});
    Object.entries(bt).forEach(([type,ps])=>{html+='<tr class="sec-row"><td colspan="'+(days+1)+'">프로젝트 · '+type+' · '+ps.length+'건</td></tr>';ps.forEach(p=>{html+=gRow(p,days);});});
    const st={};schs.forEach(s=>{(st[s.schedule_type]=st[s.schedule_type]||[]).push(s);});
    Object.entries(st).forEach(([type,items])=>{html+='<tr class="sec-row"><td colspan="'+(days+1)+'">일정 · '+scheduleLabel(type)+' · '+items.length+'건</td></tr>';items.forEach(s=>{html+=scheduleRow(s,days);});});
  }else{
    const mems=mf==='me'?[currentMember?.name].filter(Boolean):mf?[mf]:members.map(m=>m.name);
    mems.forEach(name=>{
      const mp=projs.filter(p=>p.members.includes(name));
      const ms=schs.filter(s=>(s.member_name||'')===name);
      if(!mp.length&&!ms.length)return;
      html+='<tr class="sec-row"><td colspan="'+(days+1)+'">'+name+' · 프로젝트 '+mp.length+'건 · 일정 '+ms.length+'건</td></tr>';
      mp.forEach(p=>{html+=gRow(p,days);});
      ms.forEach(s=>{html+=scheduleRow(s,days);});
    });
  }
  html+='</tbody></table>';
  document.getElementById('ganttWrap').innerHTML=html;
  renderLegend();requestAnimationFrame(fixBars);
}

function gRow(p,days){
  const conf=hasConflict(p),od=isOverdue(p),mine=currentUser&&p.created_by===currentUser.id&&!isAdmin;
  const color=TYPES[p.type]||'#4e5968';const opacity=ST_OP[p.status]||1;
  const pS=toDate(p.start),pE=toDate(p.end);
  const mFirst=new Date(curYear,curMonth-1,1),mLast=new Date(curYear,curMonth-1,days);
  const barS=pS<mFirst?1:pS.getDate();const barE=pE>mLast?days:pE.getDate();const span=barE-barS+1;
  const badges=(conf?'<span class="g-badge conflict">⚡충돌</span>':'')+(od?'<span class="g-badge overdue">⏰초과</span>':'')+(mine?'<span class="g-badge mine">내 것</span>':'');
  const client=clients.find(c=>c.id===p.client_id);
  const rowCls='row-label'+(conf?' row-conflict':od?' row-warn':'');
  const lbl='<div class="rn">'+p.name+badges+'</div><div class="rs">'+(p.members.join(', ')||'미배정')+(client?' · '+client.name:'')+'</div>';
  let cells='';
  for(let d=1;d<=days;d++){
    const wk=isWeekend(curYear,curMonth,d),td=isToday(curYear,curMonth,d);
    const cls='cell '+(wk?'weekend ':'')+( td?'today-c':'');
    if(d===barS){cells+='<td class="'+cls+'" style="position:relative"><div class="bar'+(conf?' conflict':'')+'" style="left:2px;right:0;background:'+color+';color:#fff;opacity:'+opacity+'" data-span="'+span+'" data-pid="'+p.id+'" onclick="openProjModal(this.dataset.pid)" title="'+esc(p.name)+'">'+(span>=4?esc(p.name):'')+'</div></td>';}
    else{cells+='<td class="'+cls+'"></td>';}
  }
  return '<tr><td class="'+rowCls+'" onclick="openProjModal(\''+p.id+'\')">'+lbl+'</td>'+cells+'</tr>';
}

function scheduleRow(s,days){
  const conflict=s.schedule_type==='leave'||s.schedule_type==='fieldwork'?findScheduleProjectConflict(s):[];
  const color=scheduleColor(s.schedule_type);
  const sS=toDate(s.start),sE=toDate(s.end);
  const mFirst=new Date(curYear,curMonth-1,1),mLast=new Date(curYear,curMonth-1,days);
  const barS=sS<mFirst?1:sS.getDate();const barE=sE>mLast?days:sE.getDate();const span=barE-barS+1;
  const badges=(conflict.length?'<span class="g-badge conflict">⚡배정 확인</span>':'');
  const rowCls='row-label'+(conflict.length?' row-conflict':'');
  const subtitle=[scheduleLabel(s.schedule_type),s.member_name||'미배정',s.location||''].filter(Boolean).join(' · ');
  const lbl='<div class="rn">'+esc(s.title||scheduleLabel(s.schedule_type))+badges+'</div><div class="rs">'+esc(subtitle)+'</div>';
  let cells='';
  for(let d=1;d<=days;d++){
    const wk=isWeekend(curYear,curMonth,d),td=isToday(curYear,curMonth,d);
    const cls='cell '+(wk?'weekend ':'')+( td?'today-c':'');
    if(d===barS){
      cells+='<td class="'+cls+'" style="position:relative"><div class="bar'+(conflict.length?' conflict':'')+'" style="left:2px;right:0;background:'+color+';color:#fff;opacity:.9;border:1px solid rgba(255,255,255,.38);box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)" data-span="'+span+'" data-sid="'+s.id+'" onclick="openScheduleModal(\''+s.id+'\')" title="'+esc((s.title||'')+(s.memo?' / '+s.memo:''))+'">'+(span>=3?esc(s.title||scheduleLabel(s.schedule_type)):'')+'</div></td>';
    } else cells+='<td class="'+cls+'"></td>';
  }
  return '<tr><td class="'+rowCls+'" onclick="openScheduleModal(\''+s.id+'\')">'+lbl+'</td>'+cells+'</tr>';
}

function fixBars(){
  document.querySelectorAll('.bar[data-span]').forEach(bar=>{
    const span=parseInt(bar.dataset.span);const td=bar.closest('td');if(!td)return;
    let w=0,t=td;for(let i=0;i<span;i++){if(t){w+=t.offsetWidth;t=t.nextElementSibling;}}
    bar.style.width=(w-4)+'px';bar.style.right='auto';
  });
}

function renderLegend(){
  document.getElementById('legend').innerHTML=
    Object.entries(TYPES).map(([k,c])=>'<div class="legend-item"><div class="legend-dot" style="background:'+c+'"></div>'+k+'</div>').join('')+
    Object.entries(SCHEDULE_META).filter(([k])=>k!=='project').map(([k,v])=>'<div class="legend-item"><div class="legend-dot" style="background:'+v.color+';border:1px dashed rgba(0,0,0,.15)"></div>'+v.label+'</div>').join('')+
    '<div class="legend-item" style="margin-left:12px;gap:8px"><span style="opacity:.3">■</span> 완료 <span style="opacity:.5">■</span> 예정 <span>■</span> 진행중</div>';
}

// ── Project Modal ──
let projModalTab='basic';
function openProjModal(eid,preClientId,preContractId){
  editingProjId=eid||null;
  projModalTab='basic';
  const p=eid?projects.find(x=>x.id===eid):null;
  formMembers=p?[...p.members]:(currentMember?[currentMember.name]:[]);
  const editable=!p||canEdit(p);
  renderProjModal(p,editable,preClientId,preContractId);
  if(p) loadProjectComments(p.id);

function switchProjTab(tab){
  projModalTab=tab;
  document.querySelectorAll('.modal-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  document.querySelectorAll('.modal-tab-content').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
}

function buildContractBillingSummary(contractId){
  const ct=contracts.find(x=>x.id===contractId);if(!ct)return '';
  const ctProjs=projects.filter(p=>p.contract_id===contractId);
  const total=ct.contract_amount?Number(ct.contract_amount):0;
  const billed=ctProjs.reduce((s,p)=>s+(p.billing_amount&&p.billing_status!=='미청구'?Number(p.billing_amount):0),0);
  const pct=total>0?Math.min(100,Math.round(billed/total*100)):0;
  if(!total)return '<div style="font-size:12px;color:var(--text3)">계약 금액 미입력</div>';
  return '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px">'
    +'<span style="color:var(--text2)">'+esc(ct.contract_name)+'</span>'
    +'<span style="font-weight:700;color:var(--navy)">'+billed.toLocaleString()+' / '+total.toLocaleString()+'원 ('+pct+'%)</span>'
    +'</div>'
    +'<div style="background:var(--border);border-radius:20px;height:6px;overflow:hidden">'
    +'<div style="width:'+pct+'%;height:100%;border-radius:20px;background:'+(pct>=100?'var(--green)':pct>50?'var(--blue)':'var(--orange)')+'"></div></div>';
}

function onClientChange(){
  const clientId=document.getElementById('fClient')?.value||'';
  const ctSel=document.getElementById('fContract');
  if(!ctSel)return;
  const clientContracts=contracts.filter(ct=>ct.client_id===clientId);
  ctSel.innerHTML='<option value="">계약 없음</option>'
    +clientContracts.map(ct=>'<option value="'+ct.id+'">'+esc(ct.contract_name)+(ct.contract_amount?' ('+Number(ct.contract_amount).toLocaleString()+'원)':'')+'</option>').join('');
  updateContractHint('');
}

function onContractChange(){
  const ctId=document.getElementById('fContract')?.value||'';
  updateContractHint(ctId);
  autoFillFromContract(ctId);
}

function updateContractHint(ctId){
  const hint=document.getElementById('contractHint');if(!hint)return;
  if(!ctId){hint.innerHTML='';hint.style.display='none';return;}
  const ct=contracts.find(x=>x.id===ctId);if(!ct){hint.innerHTML='';return;}
  hint.style.display='block';
  hint.innerHTML='📄 '+esc(ct.contract_name)
    +(ct.contract_amount?' · 계약금액 '+Number(ct.contract_amount).toLocaleString()+'원':'')
    +(ct.contract_start_date?' · '+ct.contract_start_date+' ~ '+(ct.contract_end_date||''):'');
  // 빌링 금액 placeholder도 업데이트
  const amtEl=document.getElementById('fAmt');
  if(amtEl&&!amtEl.value&&ct.contract_amount) amtEl.placeholder='계약금액: '+Number(ct.contract_amount).toLocaleString()+'원';
}

function renderMemberTags(){
  const el=document.getElementById('fMTags');if(!el)return;
  el.innerHTML=formMembers.map(m=>'<div class="member-tag">'+m+'<button onclick="removeMember(\''+m+'\')">×</button></div>').join('');
  refreshConflict();
}
function addMember(){const m=document.getElementById('fMSel')?.value;if(m&&!formMembers.includes(m)){formMembers.push(m);renderMemberTags();}}
function removeMember(m){formMembers=formMembers.filter(x=>x!==m);renderMemberTags();}
function refreshConflict(){
  const s=document.getElementById('fStart')?.value,e=document.getElementById('fEnd')?.value;
  const area=document.getElementById('conflictArea');if(!area)return;
  if(!s||!e){area.innerHTML='';return;}
  const c=getConflicts(formMembers,s,e,editingProjId);
  area.innerHTML=c.length?'<div class="conflict-warn">⚠ 일정 충돌: '+c.join(', ')+'와 겹칩니다</div>':'';
}

function copyProj(){
  const p=projects.find(x=>x.id===editingProjId);if(!p)return;
  closeModal();
  setTimeout(()=>{
    openProjModal(null,p.client_id,p.contract_id);
    setTimeout(()=>{
      document.getElementById('fName').value=esc(p.name)+' (복사)';
      if(document.getElementById('fType'))document.getElementById('fType').value=p.type;
      if(document.getElementById('fStatus'))document.getElementById('fStatus').value='예정';
      formMembers=[...p.members];renderMemberTags();
    },80);
  },60);
}

async function saveProj(){
  const name=document.getElementById('fName').value.trim();
  const type=document.getElementById('fType').value;
  const start=document.getElementById('fStart').value;
  const end=document.getElementById('fEnd').value;
  const status=document.getElementById('fStatus').value;
  const client_id=document.getElementById('fClient').value||null;
  const contract_id=document.getElementById('fContract')?.value||null;
  const is_billable=document.getElementById('fBillable').checked;
  const billing_status=is_billable?document.getElementById('fBilling').value:'미청구';
  const billing_amount=is_billable&&document.getElementById('fAmt').value?parseInt(document.getElementById('fAmt').value):null;
  const billing_note=is_billable?document.getElementById('fBNote').value.trim()||null:null;
  const memo=document.getElementById('fMemo').value.trim()||null;
  if(!name||!start||!end){alert('프로젝트명, 시작일, 종료일을 입력해주세요.');return;}
  if(start>end){alert('종료일이 시작일보다 빠릅니다.');return;}
  try{
    if(editingProjId){
      await api('PATCH','projects?id=eq.'+editingProjId,{name,type,start_date:start,end_date:end,status,client_id,contract_id,is_billable,billing_status,billing_amount,billing_note,memo});
      await api('DELETE','project_members?project_id=eq.'+editingProjId);
    }else{
      const res=await api('POST','projects',{name,type,start_date:start,end_date:end,status,client_id,contract_id,is_billable,billing_status,billing_amount,billing_note,memo,created_by:currentUser.id});
      editingProjId=res[0].id;
    }
    for(const mn of formMembers){const mem=members.find(m=>m.name===mn);if(mem)await api('POST','project_members',{project_id:editingProjId,member_id:mem.id});}
    await logActivity(editingProjId&&projects.find(x=>x.id===editingProjId)?'프로젝트 수정':'프로젝트 추가','project',editingProjId,name);
    closeModal();await loadAll();
    if(curPage==='gantt')renderGantt();
    else if(curPage==='detail'){
      const savedProj=projects.find(p=>p.id===editingProjId);
      const cid=savedProj?.client_id;
      if(cid)openClientDetail(cid,'projects');else setPage('clients');
    }
    else renderClients();
  }catch(e){alert('저장 오류: '+e.message);}
}

async function loadProjectComments(projectId){
  const el=document.getElementById('projectCommentSection');
  if(!el)return;
  el.innerHTML='<div class="comment-system">댓글을 불러오는 중입니다.</div>';
  try{
    projectComments=await api('GET','project_comments?project_id=eq.'+projectId+'&select=*&order=created_at.asc');
    activeReplyParentId=null;
    renderProjectComments(projectId);
  }catch(e){
    console.error(e);
    projectComments=[];
    el.innerHTML='<div class="comment-system">댓글을 불러오지 못했습니다. RLS 정책 또는 project_comments 테이블 권한을 확인해주세요.</div>';
  }
}
function renderProjectComments(projectId){
  const el=document.getElementById('projectCommentSection');
  if(!el)return;
  const roots=projectComments.filter(c=>!c.parent_id);
  const editor=''
    +'<div class="comment-editor">'
    +'<div class="form-row" style="margin-bottom:8px"><label class="form-label">메모 남기기</label><textarea id="newCommentText" rows="3" placeholder="프로젝트 진행 상황, 요청사항, 인수인계 메모 등을 남겨보세요." style="resize:vertical"></textarea></div>'
    +'<div style="display:flex;justify-content:flex-end"><button class="btn primary sm" onclick="submitProjectComment(\''+projectId+'\')">등록</button></div>'
    +'</div>';
  if(!roots.length){
    el.innerHTML='<div class="comment-empty">아직 등록된 메모가 없습니다.</div>'+editor;
    return;
  }
  el.innerHTML='<div class="comment-list">'+roots.map(c=>renderCommentItem(c,projectId,false)).join('')+'</div>'+editor;
}
function renderCommentItem(comment,projectId,isReply){
  const replies=projectComments.filter(c=>c.parent_id===comment.id);
  const mine=isAdmin||comment.created_by===currentUser?.id;
  const author=comment.author_name||comment.author||'작성자';
  return '<div class="comment-item'+(isReply?' reply':'')+'">'
    +'<div class="comment-meta"><div><span class="comment-author">'+esc(author)+'</span> <span class="comment-date">'+formatCommentDate(comment.created_at)+'</span></div></div>'
    +'<div class="comment-body">'+esc(comment.content||'')+'</div>'
    +'<div class="comment-actions">'
    +'<button class="btn ghost sm" onclick="toggleReplyForm(\''+comment.id+'\',\''+projectId+'\')">답글</button>'
    +(mine?'<button class="btn ghost sm" onclick="deleteProjectComment(\''+comment.id+'\',\''+projectId+'\')">삭제</button>':'')
    +'</div>'
    +(activeReplyParentId===comment.id?renderReplyEditor(comment.id,projectId):'')
    +replies.map(r=>renderCommentItem(r,projectId,true)).join('')
    +'</div>';
}
function renderReplyEditor(parentId,projectId){
  return '<div class="comment-editor">'
    +'<div class="form-row" style="margin-bottom:8px"><textarea id="replyText_'+parentId+'" rows="2" placeholder="답글을 입력하세요." style="resize:vertical"></textarea></div>'
    +'<div style="display:flex;justify-content:flex-end;gap:6px"><button class="btn ghost sm" onclick="cancelReplyForm(\''+projectId+'\')">취소</button><button class="btn primary sm" onclick="submitProjectComment(\''+projectId+'\',\''+parentId+'\')">등록</button></div>'
    +'</div>';
}
function toggleReplyForm(parentId,projectId){
  activeReplyParentId=activeReplyParentId===parentId?null:parentId;
  renderProjectComments(projectId);
}
function cancelReplyForm(projectId){
  activeReplyParentId=null;
  renderProjectComments(projectId);
}
async function submitProjectComment(projectId,parentId=''){
  const textarea=document.getElementById(parentId?'replyText_'+parentId:'newCommentText');
  const content=textarea?.value.trim();
  if(!content){alert('내용을 입력해주세요.');return;}
  const body={
    project_id:projectId,
    parent_id:parentId||null,
    content,
    author_name:currentMember?.name||currentUser?.email||'작성자',
    created_by:currentUser?.id||null,
    member_id:currentMember?.id||null
  };
  try{
    await api('POST','project_comments',body);
    activeReplyParentId=null;
    await loadProjectComments(projectId);
  }catch(e){
    alert('댓글 저장 오류: '+e.message);
  }
}
async function deleteProjectComment(commentId,projectId){
  if(!confirm('이 메모를 삭제할까요?'))return;
  try{
    await api('DELETE','project_comments?or=(id.eq.'+commentId+',parent_id.eq.'+commentId+')');
    await loadProjectComments(projectId);
  }catch(e){
    alert('삭제 오류: '+e.message);
  }
}

    +(s&&editable?'<button class="btn danger" onclick="deleteSchedule(\''+s.id+'\')">삭제</button>':'<div></div>')
    +'<div class="modal-footer-right"><button class="btn ghost" onclick="closeModal()">'+(editable?'취소':'닫기')+'</button>'+(editable?'<button class="btn primary" data-id="'+(s?s.id:'')+'" onclick="saveSchedule(this.dataset.id)">저장</button>':'')+'</div>'
    +'</div></div></div>';
  if(editable){['scType','scMember','scStart','scEnd'].forEach(id=>document.getElementById(id)?.addEventListener('input',refreshScheduleConflict)); refreshScheduleConflict();}

function refreshScheduleConflict(){
  const type=document.getElementById('scType')?.value;
  const memberName=document.getElementById('scMember')?.value;
  const start=document.getElementById('scStart')?.value;
  const end=document.getElementById('scEnd')?.value;
  const area=document.getElementById('scheduleConflictArea');
  if(!area)return;
  if(!memberName||!start||!end||(type!=='leave'&&type!=='fieldwork')){area.innerHTML='';return;}
  const conflicts=projects.filter(p=>p.members.includes(memberName)&&toDate(start)<=toDate(p.end)&&toDate(end)>=toDate(p.start)&&p.status!=='완료');
  area.innerHTML=conflicts.length?'<div class="conflict-warn">⚠ 해당 기간에 배정된 프로젝트: '+conflicts.map(p=>p.name).join(', ')+'</div>':'';
}
async function saveSchedule(eid){
  const title=document.getElementById('scTitle').value.trim();
  const schedule_type=document.getElementById('scType').value;
  const member_name=document.getElementById('scMember').value;
  const member=members.find(m=>m.name===member_name);
  const start_date=document.getElementById('scStart').value;
  const end_date=document.getElementById('scEnd').value;
  const location=document.getElementById('scLocation').value.trim()||null;
  const memo=document.getElementById('scMemo').value.trim()||null;
  if(!title||!member_name||!start_date||!end_date){alert('일정명, 담당자, 시작일, 종료일을 입력해주세요.');return;}
  if(start_date>end_date){alert('종료일이 시작일보다 빠릅니다.');return;}
  const body={title,schedule_type,member_id:member?.id||null,member_name,start_date,end_date,location,memo};
  try{
    if(eid) await api('PATCH','schedules?id=eq.'+eid,body);
    else {body.created_by=currentUser?.id||null; await api('POST','schedules',body);} 
    closeModal();await loadAll(); if(curPage==='gantt')renderGantt(); else renderClients();
  }catch(e){alert('일정 저장 오류: '+e.message);} 
}
async function deleteSchedule(id){
  if(!confirm('일정을 삭제할까요?'))return;
  try{await api('DELETE','schedules?id=eq.'+id);closeModal();await loadAll();if(curPage==='gantt')renderGantt();else renderClients();}catch(e){alert('오류: '+e.message);} 
}

function openDashDrilldown(type){

  const active=projects.filter(p=>p.status==='진행중');
  const overdue=projects.filter(p=>isOverdue(p));
  const unbilled=projects.filter(p=>p.status==='완료'&&p.is_billable&&p.billing_status==='미청구');

    title='기간 초과 프로젝트';

    title='빌링 미처리 프로젝트';
    body=unbilled.length?unbilled.map(p=>'<div class="notice-card" onclick="closeModal();openProjModal(\''+p.id+'\')"><div class="notice-title">'+esc(p.name)+'</div><div class="notice-meta">'+esc((clients.find(c=>c.id===p.client_id)?.name||'고객사 없음')+' · 완료')+'</div><div class="notice-preview">'+esc((p.billing_amount?Number(p.billing_amount).toLocaleString()+'원 · ':'')+(p.billing_note||'청구 필요'))+'</div></div>').join(''):'<div class="notice-empty">빌링 미처리 프로젝트가 없습니다.</div>';
  }else if(type==='leave'){
    title='휴가 일정';
    body=leaves.length?leaves.map(s=>'<div class="notice-card" onclick="closeModal();openScheduleModal(\''+s.id+'\')"><div class="notice-title">'+esc(s.member_name||'미지정')+'</div><div class="notice-meta">'+esc((s.title||'휴가')+' · '+s.start_date+' ~ '+s.end_date)+'</div><div class="notice-preview">'+esc(s.memo||'')+'</div></div>').join(''):'<div class="notice-empty">휴가 일정이 없습니다.</div>';
  }else if(type==='fieldwork'){

// ── Notices ──
function formatDate(ts){const d=new Date(ts);return d.getFullYear()+'.'+(d.getMonth()+1).toString().padStart(2,'0')+'.'+d.getDate().toString().padStart(2,'0');}

function renderNotices(){
  const el=document.getElementById('noticeList');
  if(!notices.length){el.innerHTML='<div class="notice-empty">공지사항이 없습니다.</div>';return;}
  el.innerHTML=notices.map(n=>'<div class="notice-card'+(n.is_pinned?' pinned':'')+'" onclick="openNoticeDetail(this.dataset.id)" data-id="'+n.id+'">'
    +'<div class="notice-chip-row">'+(n.is_pinned?'<span class="badge badge-blue">📌 고정</span>':'')+(n.require_confirm?'<span class="badge badge-red">필독</span>':'')+'</div>'
    +'<div class="notice-title">'+esc(n.title)+'</div>'
    +'<div class="notice-meta">'+formatDate(n.created_at)+'</div>'
    +'<div class="notice-preview">'+esc(n.content.substring(0,120))+'</div>'
    +'</div>').join('');
}

function openNoticeDetail(id){
  const n=notices.find(x=>x.id===id);if(!n)return;
  document.getElementById('modalArea').innerHTML=
    '<div class="overlay" onclick="if(event.target===this)closeModal()">'
    +'<div class="modal" style="width:560px">'
    +(n.require_confirm?'<div style="margin-bottom:12px"><span class="badge badge-red">📌 필독 공지</span></div>':'')
    +'<div class="notice-detail-title">'+esc(n.title)+'</div>'
    +'<div class="notice-detail-meta">'+formatDate(n.created_at)+'</div>'
    +'<div class="notice-detail-body">'+esc(n.content)+'</div>'
    +'<div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">'
    +'<div style="font-size:12px;font-weight:700;color:var(--text3);margin-bottom:10px">댓글</div>'
    +'<div id="noticeComments" style="margin-bottom:12px"><div style="color:var(--text3);font-size:12px">불러오는 중...</div></div>'
    +'<div style="display:flex;gap:8px"><input id="ncInput" placeholder="댓글을 입력하세요" style="flex:1;padding:9px 12px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit" onkeydown="if(event.key===\'Enter\')submitNoticeComment(\''+n.id+'\')"/>'
    +'<button class="btn primary sm" onclick="submitNoticeComment(\''+n.id+'\')">등록</button></div>'
    +'</div>'
    +'<div class="modal-footer" style="margin-top:16px">'+(isAdmin?'<button class="btn danger" data-id="'+n.id+'" onclick="deleteNotice(this.dataset.id)">삭제</button>':'<div></div>')
    +'<div class="modal-footer-right">'+(isAdmin?'<button class="btn ghost" data-id="'+n.id+'" onclick="openNoticeEdit(this.dataset.id)">수정</button>':'')
    +'<button class="btn ghost" onclick="closeModal()">닫기</button></div></div>'
    +'</div></div>';
  loadNoticeComments(n.id);
}

async function loadNoticeComments(noticeId){
  const el=document.getElementById('noticeComments');if(!el)return;
  try{
    const comments=await api('GET','notice_comments?notice_id=eq.'+noticeId+'&select=*&order=created_at.asc');
    if(!comments||!comments.length){el.innerHTML='<div style="color:var(--text3);font-size:12px">아직 댓글이 없습니다.</div>';return;}
    el.innerHTML=comments.map(c=>'<div style="display:flex;gap:10px;margin-bottom:10px">'
      +'<div style="width:26px;height:26px;border-radius:50%;background:var(--blue-light);color:var(--blue);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+(c.author_name||'?').charAt(0)+'</div>'
      +'<div style="flex:1"><div style="font-size:12px;font-weight:700;color:var(--navy)">'+esc(c.author_name||'익명')+'<span style="font-size:11px;color:var(--text3);font-weight:400;margin-left:6px">'+formatCommentDate(c.created_at)+'</span></div>'
      +'<div style="font-size:13px;color:var(--text2);margin-top:2px">'+esc(c.content)+'</div></div>'
      +(c.created_by===currentUser?.id?'<button class="btn ghost sm" style="padding:2px 8px;font-size:11px;flex-shrink:0" onclick="deleteNoticeComment(\''+c.id+'\',\''+noticeId+'\')">삭제</button>':'')
      +'</div>').join('');
  }catch(e){el.innerHTML='<div style="color:var(--red);font-size:12px">댓글 로딩 실패</div>';}
}

async function submitNoticeComment(noticeId){
  const input=document.getElementById('ncInput');
  const content=input?.value.trim();if(!content)return;
  try{
    await api('POST','notice_comments',{notice_id:noticeId,content,author_name:currentMember?.name||currentUser?.email,created_by:currentUser?.id});
    input.value='';
    await loadNoticeComments(noticeId);
  }catch(e){alert('댓글 등록 오류: '+e.message);}
}

async function deleteNoticeComment(id,noticeId){
  if(!confirm('댓글을 삭제할까요?'))return;
  try{await api('DELETE','notice_comments?id=eq.'+id);await loadNoticeComments(noticeId);}
  catch(e){alert('오류: '+e.message);}
}

async function addRestaurant(){
  const name=document.getElementById('rName')?.value.trim();

  const body={name,category:document.getElementById('rCat').value,distance:document.getElementById('rDist').value.trim()||null,memo:document.getElementById('rMemo').value.trim()||null,created_by:currentUser?.id};
  try{await api('POST','restaurants',body);await openRestaurantManager();}
  catch(e){alert('오류: '+e.message);}
}

async function deleteRestaurant(id){
  if(!confirm('식당을 삭제할까요?'))return;
  try{await api('DELETE','restaurants?id=eq.'+id);await openRestaurantManager();}
  catch(e){alert('오류: '+e.message);}
}

function openNoticeEdit(id){closeModal();openNoticeWrite(id);}
async function saveNotice(eid){
  const title=document.getElementById('nTitle').value.trim(),content=document.getElementById('nContent').value.trim();
  const is_pinned=document.getElementById('nPin').checked,require_confirm=document.getElementById('nReq').checked;
  if(!title||!content){alert('제목과 내용을 입력해주세요.');return;}
  try{
    if(eid){await api('PATCH','notices?id=eq.'+eid,{title,content,is_pinned,require_confirm,updated_at:new Date().toISOString()});}
    else{await api('POST','notices',{title,content,is_pinned,require_confirm,created_by:currentUser.id});}
    closeModal();await loadAll();if(curPage==='notice')renderNotices();else renderClients();
  }catch(e){alert('오류: '+e.message);}
}
async function deleteNotice(id){
  if(!confirm('삭제할까요?'))return;
  try{await api('DELETE','notices?id=eq.'+id);closeModal();await loadAll();if(curPage==='notice')renderNotices();else renderClients();}
  catch(e){alert('오류: '+e.message);}
}

async function addNewMember(){
  const name=document.getElementById('nMN')?.value.trim(),email=document.getElementById('nME')?.value.trim()||null;

  try{await api('POST','members',{name,email});await loadAll();openMemberManager();}
  catch(e){const s=document.getElementById('mms');s.textContent='오류: '+e.message;s.style.color='var(--red)';}

  try{await api('DELETE','members?id=eq.'+id);await loadAll();openMemberManager();}catch(e){alert('오류: '+e.message);}
}
