        chips: ["공유형", "외향적", "함께 즐김"],
        products: [
          {
            name: "바프 버터솔트 팝콘",
            desc: "가볍게 같이 즐기기 좋은 맛. 영화나 수다 시간에 잘 어울립니다.",
            url: "https://link.coupang.com/a/elEJK7"
          },
          {
            name: "곰곰 스윗점보팝콘",
            desc: "달달한 분위기를 더해주는 팝콘. 여럿이 함께 먹기 좋습니다.",
            url: "https://link.coupang.com/a/elEJ2L"
          },
          {
            name: "다르다팝콘 시네마 믹스",
            desc: "영화 볼 때 분위기를 확 살려주는 간식. 공유형 타입에게 특히 잘 맞아요.",
            url: "https://link.coupang.com/a/elEKeN"
          }
        ]
      },
      {
        min: 6,
        max: 6,
        type: "chocolate",
        image: "images/chocolate.png",
        title: "당신은 초콜릿형 인간입니다",
        summary: "나를 위한 소비를 즐길 줄 아는, 감각 만족형",
        description: "당신은 단순히 배를 채우는 소비보다, 기분과 분위기까지 만족시키는 선택을 더 중요하게 생각합니다. 오늘은 조금 더 괜찮은 걸 고를 자격이 충분해요.",
        chips: ["자기보상", "가치소비", "감각 중시"],
        products: [
          {
            name: "나트라 코코아 트러플스 초콜릿",
            desc: "나를 위한 작은 보상이 필요할 때 만족도가 높은 프리미엄 디저트입니다.",
            url: "https://link.coupang.com/a/elEKwb"
          },
          {
            name: "벨기에 부샤드 밀크초콜릿",
            desc: "기분을 부드럽게 올려주는 달콤한 선택. 조금 더 제대로 즐기고 싶은 날 추천해요.",
            url: "https://link.coupang.com/a/elEKBz"
          },
          {
            name: "위니비니 베어 초콜릿",
            desc: "귀엽고 달콤한 감성까지 챙길 수 있는 초콜릿. 선물처럼 즐기기 좋아요.",
            url: "https://link.coupang.com/a/elEKH6"
          }
        ]
      }
    ];

    const landing = document.getElementById("landing");
    const quiz = document.getElementById("quiz");
    const result = document.getElementById("result");

    const questionTitle = document.getElementById("questionTitle");
    const answersWrap = document.getElementById("answersWrap");
    const progressLabel = document.getElementById("progressLabel");
    const progressBar = document.getElementById("progressBar");

    const resultCharacter = document.getElementById("resultCharacter");
    const resultTitle = document.getElementById("resultTitle");
    const resultSummary = document.getElementById("resultSummary");
    const resultDescription = document.getElementById("resultDescription");
    const resultChips = document.getElementById("resultChips");
    const productsWrap = document.getElementById("productsWrap");

    const startBtn = document.getElementById("startBtn");
    const retryBtn = document.getElementById("retryBtn");
    const copyBtn = document.getElementById("copyBtn");
    const copyLinkBtn = document.getElementById("copyLinkBtn");
    const shareBtn = document.getElementById("shareBtn");

    let currentIndex = 0;
    let totalScore = 0;

    function showSection(target) {
      [landing, quiz, result].forEach(el => el.classList.remove("active"));
      target.classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function startTest() {
      currentIndex = 0;
      totalScore = 0;
      renderQuestion();
      showSection(quiz);
    }

    function renderQuestion() {
      const current = questions[currentIndex];
      questionTitle.textContent = current.q;
      progressLabel.textContent = `${currentIndex + 1} / ${questions.length}`;
      progressBar.style.width = `${((currentIndex + 1) / questions.length) * 100}%`;

      answersWrap.innerHTML = "";

      current.a.forEach(answer => {
        const btn = document.createElement("button");
        btn.className = "answer";
        btn.textContent = answer[0];
        btn.addEventListener("click", () => chooseAnswer(answer[1]));
        answersWrap.appendChild(btn);
      });
    }

    function chooseAnswer(score) {
      totalScore += score;
      currentIndex += 1;

      if (currentIndex < questions.length) {
        renderQuestion();
      } else {
        renderResult();
      }
    }

    function getResultByScore(score) {
      return resultMap.find(item => score >= item.min && score <= item.max) || resultMap[0];
    }

    function getResultByType(type) {
      return resultMap.find(item => item.type === type) || null;
    }

    async function copyTextSafe(text) {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return true;
        }
      } catch (e) {}

      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.style.position = "fixed";
      textarea.style.left = "-9999px";
      document.body.appendChild(textarea);
      textarea.focus();
      textarea.select();

      let success = false;
      try {
        success = document.execCommand("copy");
      } catch (e) {
        success = false;
      }

      document.body.removeChild(textarea);
      return success;
    }

    function buildResultUrl(type) {
      const url = new URL(SITE_URL);
      url.searchParams.set("result", type);
      return url.toString();
    }

    function setButtonTemporaryText(button, text, originalText) {
      button.textContent = text;
      setTimeout(() => {
        button.textContent = originalText;
      }, 1500);
    }

    function renderResult(resultData = null) {
      const data = resultData || getResultByScore(totalScore);
      const resultUrl = buildResultUrl(data.type);

      history.replaceState({}, "", `?result=${data.type}`);

      resultCharacter.src = data.image;
      resultCharacter.style.display = "block";
      resultCharacter.onerror = () => {
        resultCharacter.style.display = "none";
      };

      resultTitle.textContent = data.title;
      resultSummary.textContent = data.summary;
      resultDescription.textContent = data.description;

      resultChips.innerHTML = "";
      data.chips.forEach(chip => {
        const span = document.createElement("span");
        span.className = "chip";
        span.textContent = chip;
        resultChips.appendChild(span);
      });

      productsWrap.innerHTML = "";
      data.products.forEach(product => {
        const article = document.createElement("article");
        article.className = "product";

        const name = document.createElement("div");
        name.className = "product-name";
        name.textContent = product.name;

        const desc = document.createElement("div");
        desc.className = "product-desc";
        desc.textContent = product.desc;

        const link = document.createElement("a");
        link.href = product.url;
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.textContent = "쿠팡에서 보기";

        article.appendChild(name);
        article.appendChild(desc);
        article.appendChild(link);
        productsWrap.appendChild(article);
      });

      const shareText = `나 ${data.title.replace("당신은 ", "").replace("입니다", "")} 나옴ㅋㅋ ${data.summary}\n이거 은근 잘 맞는다… 너도 해봐 🍪`;

      copyBtn.onclick = async () => {
        const ok = await copyTextSafe(`${shareText}\n${resultUrl}`);
        if (ok) {
          setButtonTemporaryText(copyBtn, "복사 완료", "결과 문구 복사");
        } else {
          alert("복사에 실패했어요.");
        }
      };

      copyLinkBtn.onclick = async () => {
        const ok = await copyTextSafe(resultUrl);
        if (ok) {
          setButtonTemporaryText(copyLinkBtn, "복사 완료", "링크 복사");
        } else {
          alert("링크 복사에 실패했어요.");
        }
      };

      shareBtn.onclick = async () => {
        if (navigator.share) {
          try {
            await navigator.share({
              title: "요즘 당신의 과자 성격 유형은?",
              text: "1분이면 결과 나오는 과자 성격 테스트 🍪",
              url: resultUrl
            });
          } catch (e) {}
        } else {
          const ok = await copyTextSafe(resultUrl);
          if (ok) {
            alert("공유 기능을 지원하지 않아 링크를 복사했어요.");
          } else {
            alert("공유에 실패했어요.");
          }
        }
      };

      showSection(result);
    }

    startBtn.addEventListener("click", startTest);

    retryBtn.addEventListener("click", () => {
      history.replaceState({}, "", window.location.pathname);
      startTest();
    });

    window.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(window.location.search);
      const resultType = params.get("result");

      if (resultType) {
        const resultData = getResultByType(resultType);
        if (resultData) {
          renderResult(resultData);
          return;
        }
      }

      showSection(landing);
    });
  </script>
</body>
</html>
