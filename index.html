<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>요즘 당신의 과자 성격 유형은?</title>

  <!-- 공유 최적화 (OG) -->
  <meta property="og:title" content="요즘 당신의 과자 성격 유형은?" />
  <meta property="og:description" content="1분이면 결과 나오는 과자 성격 테스트 🍪" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://mbtim.netlify.app" />
  <meta property="og:image" content="https://mbtim.netlify.app/images/thumbnail.png" />

  <meta name="twitter:card" content="summary_large_image" />

  <style>
    body {
      font-family: sans-serif;
      background: #fffaf5;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 20px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    button {
      padding: 12px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }
    .primary {
      background: #ff8f5a;
      color: white;
    }
    img {
      width: 120px;
    }
  </style>
</head>

<body>

<div class="card" id="app">

  <!-- 랜딩 -->
  <div id="landing">
    <h1>🍪 과자 성격 테스트</h1>
    <p>1분이면 결과 확인 가능</p>
    <button class="primary" onclick="start()">테스트 시작</button>
  </div>

  <!-- 질문 -->
  <div id="quiz" style="display:none;">
    <h2 id="question"></h2>
    <div id="answers"></div>
  </div>

  <!-- 결과 -->
  <div id="result" style="display:none;">
    <img id="character"/>
    <h2 id="title"></h2>
    <p id="desc"></p>

    <div id="products"></div>

    <button onclick="copyText()">결과 복사</button>
    <button onclick="copyLink()">링크 복사</button>
    <button onclick="share()">공유하기</button>
    <button onclick="start()">다시하기</button>
  </div>

</div>

<script>

const questions = [
  ["주말?", ["혼자",0],["사람",1]],
  ["요즘?", ["안정",0],["자극",1]],
  ["간식?", ["혼자",0],["같이",1]],
  ["취향?", ["익숙",0],["새로움",1]],
  ["스트레스?", ["혼자",0],["밖에서",1]],
  ["소비?", ["소확행",0],["확질러",1]],
];

let step=0, score=0;

function start(){
  step=0; score=0;
  landing.style.display="none";
  result.style.display="none";
  quiz.style.display="block";
  next();
}

function next(){
  if(step>=questions.length) return showResult();

  question.innerText = questions[step][0];
  answers.innerHTML="";

  questions[step].slice(1).forEach(a=>{
    let btn=document.createElement("button");
    btn.innerText=a[0];
    btn.onclick=()=>{score+=a[1];step++;next();}
    answers.appendChild(btn);
  });
}

function showResult(){

  quiz.style.display="none";
  result.style.display="block";

  let data;

  if(score<=1){
    data={
      title:"빼빼로형",
      img:"images/pepero.png",
      desc:"혼자 충전하는 타입",
      products:[
        ["빼빼로 크런키","https://link.coupang.com/a/elEFfW"],
        ["빼빼로 아몬드","https://link.coupang.com/a/elEFBH"]
      ]
    }
  } else if(score==2){
    data={
      title:"쿠키형",
      img:"images/cookie.png",
      desc:"편안한 루틴형",
      products:[
        ["버터쿠키","https://link.coupang.com/a/elEGd7"]
      ]
    }
  } else {
    data={
      title:"젤리형",
      img:"images/jelly.png",
      desc:"자극 추구형",
      products:[
        ["하리보","https://link.coupang.com/a/elEH3L"]
      ]
    }
  }

  character.src=data.img;
  title.innerText=data.title;
  desc.innerText=data.desc;

  products.innerHTML="";
  data.products.forEach(p=>{
    let a=document.createElement("a");
    a.href=p[1];
    a.target="_blank";
    a.innerText=p[0];
    products.appendChild(a);
    products.appendChild(document.createElement("br"));
  });

}

function copyText(){
  navigator.clipboard.writeText("나 이거 해봤는데 웃김ㅋㅋ");
}

function copyLink(){
  navigator.clipboard.writeText(location.href);
}

function share(){
  if(navigator.share){
    navigator.share({
      title:"과자 테스트",
      url:location.href
    })
  }
}

</script>

</body>
</html>
